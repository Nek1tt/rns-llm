name: cpu-tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: RNS_LLM_BUILD_CUDA=0 pip install -e ".[dev]" --no-build-isolation
      - run: pytest -q -m "not cuda"
